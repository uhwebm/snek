name: Build and Release

on:
  push:
    tags:
      - "v*"   # triggers on version tags like v1.0.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows_amd64
            output: snek.exe

          - os: ubuntu-latest
            target: linux_amd64
            output: snek_linux

          - os: macos-latest
            target: darwin_arm64
            output: snek_macos_arm

          # Optional Intel Mac build
          - os: macos-latest
            target: darwin_amd64
            output: snek_macos_intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Odin
        shell: bash
        run: |
          set -e

          if [[ "$RUNNER_OS" == "Windows" ]]; then
            curl -L https://github.com/odin-lang/Odin/releases/latest/download/odin-windows-amd64.zip -o odin.zip
            unzip odin.zip
            echo "$PWD/odin" >> $GITHUB_PATH

          elif [[ "$RUNNER_OS" == "Linux" ]]; then
            curl -L https://github.com/odin-lang/Odin/releases/latest/download/odin-linux-amd64.tar.gz -o odin.tar.gz
            tar -xzf odin.tar.gz
            echo "$PWD/odin-linux-amd64" >> $GITHUB_PATH

          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            curl -L https://github.com/odin-lang/Odin/releases/latest/download/odin-macos-amd64.tar.gz -o odin.tar.gz
            tar -xzf odin.tar.gz
            echo "$PWD/odin-macos-amd64" >> $GITHUB_PATH
          fi

      - name: Build
        run: |
          mkdir -p out
          odin build source -target:${{ matrix.target }} -out:out/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: out/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}