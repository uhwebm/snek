name: Build and Release

on:
  push:
    tags:
      - "v*"   # triggers on version tags like v1.0.0

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows_amd64
            output: snek.exe

          - os: ubuntu-latest
            target: linux_amd64
            output: snek_linux

          - os: macos-latest
            target: darwin_arm64
            output: snek_macos_arm

          # Optional Intel Mac build
          - os: macos-latest
            target: darwin_amd64
            output: snek_macos_intel

    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Odin
        run: |
          git clone https://github.com/odin-lang/Odin.git
          cd Odin
          make release
          echo "$PWD" >> $GITHUB_PATH

      - name: Build
        run: |
          mkdir -p out
          odin build source -target:${{ matrix.target }} -out:out/${{ matrix.output }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: out/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}