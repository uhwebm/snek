name: Build and Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            target: windows_amd64
            output: snek.exe
          - os: ubuntu-latest
            target: linux_amd64
            output: snek_linux
          - os: macos-latest
            target: darwin_arm64
            output: snek_macos_arm
          - os: macos-latest
            target: darwin_amd64
            output: snek_macos_intel

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Install Odin (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Invoke-WebRequest https://github.com/odin-lang/Odin/releases/latest/download/odin-windows-amd64.zip -OutFile odin.zip
          Expand-Archive odin.zip -DestinationPath .
          $dir = Get-ChildItem -Directory | Where-Object { $_.Name -like "odin*" } | Select-Object -First 1
          "$PWD\$($dir.Name)" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Odin (Unix)
        if: runner.os != 'Windows'
        run: |
          curl -L https://github.com/odin-lang/Odin/releases/latest/download/odin-linux-amd64.zip -o odin.zip || \
          curl -L https://github.com/odin-lang/Odin/releases/latest/download/odin-macos-amd64.zip -o odin.zip
          unzip odin.zip
          ODIN_DIR=$(find . -maxdepth 1 -type d -name "odin*" | head -n 1)
          echo "$PWD/$ODIN_DIR" >> $GITHUB_PATH

      - run: odin version

      - run: |
          mkdir -p out
          odin build source -target:${{ matrix.target }} -out:out/${{ matrix.output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.output }}
          path: out/${{ matrix.output }}

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}